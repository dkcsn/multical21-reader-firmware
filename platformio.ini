; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Previous default was esp8266_lite.
;default_envs = lolin_s2_mini
default_envs = esp8266_lite

; OTA upload targets use ArduinoOTA over mDNS.
; Device name in setup controls the hostname, default: multical21.local
; Examples:
;   pio run -e lolin_s2_mini_ota -t upload
;   pio run -e esp8266_lite_ota -t upload
; If mDNS is flaky, override with IP:
;   pio run -e lolin_s2_mini_ota -t upload --upload-port 192.168.201.217
; Note: ESP8266 Lite has 1MB flash and may be too small for reliable OTA
; if the firmware grows beyond the available OTA slot.

[env:lolin_s2_mini]
framework = arduino
platform = espressif32
board = lolin_s2_mini
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/cu.usbmodem01
monitor_port = /dev/cu.usbmodem01
build_unflags =
	-D BOARD_HAS_PSRAM
build_flags =
	-D BOARD_LOLIN_S2_MINI
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	knolleary/PubSubClient@^2.8

[env:lolin_s2_mini_ota]
extends = env:lolin_s2_mini
upload_protocol = espota
upload_port = multical21.local
monitor_port = socket://multical21.local:23

[env:esp32]
framework = arduino
platform = espressif32
board = az-delivery-devkit-v4
board_build.mcu = esp32
monitor_speed = 115200
lib_deps =
	knolleary/PubSubClient@^2.8

[env:esp8266]
framework = arduino
platform = espressif8266
board = d1_mini
board_build.mcu = esp8266
monitor_speed = 115200
lib_deps =
	rweather/Crypto @ ^0.2.0
	knolleary/PubSubClient@^2.8

[env:esp8266_lite_ota]
extends = env:esp8266_lite
upload_protocol = espota
upload_port = multical21.local
monitor_port = socket://multical21.local:23

[env:esp8266_lite]
framework = arduino
platform = espressif8266
board = d1_mini_lite
board_build.mcu = esp8266
monitor_speed = 115200
lib_deps =
	rweather/Crypto @ ^0.2.0
	knolleary/PubSubClient@^2.8
