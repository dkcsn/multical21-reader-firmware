name: Release firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            printf '#pragma once\n'
            printf '#define FW_VERSION "%s"\n' "${VERSION}"
            printf '#define FW_GIT_SHA "%s"\n' "${SHORT_SHA}"
            printf '#define FW_BUILD_DATE "%s"\n' "${BUILD_DATE}"
          } > include/FirmwareBuildOverrides.h

          set +e
          platformio run -e esp8266_lite -e lolin_s2_mini 2>&1 | tee build.log
          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "${BUILD_STATUS}" -ne 0 ]; then
            {
              echo "PlatformIO build failed. Last 80 log lines:"
              tail -n 80 build.log
            } > build-error.txt
            MESSAGE="$(sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' build-error.txt)"
            echo "::error title=PlatformIO build failed::${MESSAGE}"
            exit "${BUILD_STATUS}"
          fi

          mkdir -p dist
          cp .pio/build/esp8266_lite/firmware.bin "dist/multical21-reader-${VERSION}-esp8266-lite.bin"
          cp .pio/build/lolin_s2_mini/firmware.bin "dist/multical21-reader-${VERSION}-lolin-s2-mini.bin"
          sha256sum dist/*.bin > dist/SHA256SUMS.txt

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multical21-reader-firmware
          path: dist/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            Firmware binaries:

            - `multical21-reader-${{ github.ref_name }}-esp8266-lite.bin` for D1 mini Lite / ESP8266 Lite builds.
            - `multical21-reader-${{ github.ref_name }}-lolin-s2-mini.bin` for LOLIN S2 Mini ESP32-S2 builds.

            Use the binary that matches the board you flashed originally. SHA256 checksums are attached in `SHA256SUMS.txt`.
